<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🥩hhh</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "PingFang SC", "Microsoft JhengHei", sans-serif;
  background-color: #fef6f0;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}
.card {
  background-color: #fff;
  border-radius: 20px;
  box-shadow: 0 8px 30px rgba(210, 105, 30, 0.15);
  padding: 40px 30px;
  max-width: 480px;
  width: 100%;
  text-align: center;
}
.emoji {
  font-size: 48px;
  animation: sizzle 2s ease-in-out infinite alternate;
}
@keyframes sizzle {
  from { transform: scale(1) rotate(-3deg); }
  to { transform: scale(1.1) rotate(3deg); }
}
h1 {
  color: #d2691e;
  font-size: 1.8rem;
  margin-top: 10px;
  margin-bottom: 8px;
}
.subtitle {
  color: #999;
  font-size: 0.9rem;
  margin-bottom: 24px;
}
.to-name {
  color: #c0392b;
  font-weight: bold;
}
.message {
  background-color: #fff8f0;
  border-radius: 12px;
  padding: 18px 16px;
  margin-bottom: 28px;
  color: #5d4037;
  line-height: 1.8;
  font-size: 1rem;
  border-left: 4px solid #ffab73;
  text-align: left;
}
.feedback {
  display: none;
  background-color: #e8f5e9;
  border-radius: 12px;
  padding: 18px;
  margin-top: 10px;
  color: #2e7d32;
  font-weight: bold;
  animation: popIn 0.4s ease;
}
@keyframes popIn {
  0% { opacity: 0; transform: scale(0.8); }
  100% { opacity: 1; transform: scale(1); }
}
.checkbox-group {
  display: flex;
  flex-direction: column;
  gap: 14px;
  margin-bottom: 10px;
}
.option-label {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 16px;
  border-radius: 14px;
  background-color: #fff0e6;
  border: 2px solid transparent;
  cursor: pointer;
  transition: all 0.3s ease;
  font-size: 1.1rem;
  color: #5d4037;
  position: relative;
}
.option-label:hover {
  background-color: #ffe0c8;
  transform: translateY(-2px);
}
.option-label input[type="radio"], .option-label input[type="checkbox"] {
  width: 20px;
  height: 20px;
  accent-color: #d2691e;
  cursor: pointer;
}
.option-label.both-check {
  background-color: #f3e5f5;
}
.option-label.both-check:hover {
  background-color: #e1bee7;
}
.confirm-btn {
  margin-top: 24px;
  padding: 14px 36px;
  font-size: 1.1rem;
  color: white;
  background-color: #d2691e;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  transition: all 0.3s ease;
}
.confirm-btn:hover {
  background-color: #b25918;
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(210, 105, 30, 0.3);
}
.confirm-btn:active {
  transform: translateY(0);
}
</style>
</head>
<body>

<div class="card">
<div class="emoji">🥩🔥🍖</div>
<h1>烤肉局邀请函</h1>
<p class="subtitle">From: hygee / To: <span class="to-name">dscad</span></p>

<div class="message">
嗨～dscad！
这周末要不要一起吃烤肉呀
已经憋不住想吃香喷喷的烤肉了
本人已提前空好肚子
你快来选一天！
</div>

<div class="checkbox-group">
<label class="option-label">
  <input type="radio" name="day" value="周六">
  <span>🌞 周六 — 白天逛街晚上吃肉，美滋滋</span>
</label>
<label class="option-label">
  <input type="radio" name="day" value="周日">
  <span>😎 周日 — 前六天挨的饿这顿补回来</span>
</label>
<label class="option-label both-check">
  <input type="checkbox" id="both">
  <span>🤤 不能光选一天，我全都要（多选）</span>
</label>
</div>

<button class="confirm-btn" onclick="submitChoice()">确认选择！🍖</button>

<div class="feedback" id="feedback"></div>
</div>

<script>
function submitChoice() {
  const radios = document.querySelectorAll('input[name="day"]');
  const both = document.querySelector('#both');
  const feedback = document.querySelector('#feedback');
  let selected = [];
  radios.forEach(r => { if (r.checked) selected.push(r.value); });
  if (both.checked) selected.push('我全都要');

  if (selected.length === 0) {
    feedback.style.display = 'block';
    feedback.style.backgroundColor = '#ffebee';
    feedback.style.color = '#c62828';
    feedback.textContent = '不选一个日子就……我只能对着空气烤肉了 🥺';
  } else {
    feedback.style.display = 'block';
    feedback.style.backgroundColor = '#e8f5e9';
    feedback.style.color = '#2e7d32';
    if (selected.includes('我全都要')) {
      feedback.textContent = '好耶！成年人不做选择，全都要！🥩🥩🥩 收到你的回复啦～';
    } else {
      feedback.textContent = '收到！「' + selected.join('、') + '」已预订成功！期待烤肉局 🍖🍻';
    }
  }
}
</script>

</body>
</html>
