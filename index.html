<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🥩 烤肉局邀请函</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "PingFang SC", "Microsoft JhengHei", sans-serif;
  background-color: #fef6f0;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  min-height: 100dvh;
  padding: 20px;
  padding-bottom: 80px;
  overflow-y: auto;
  transition: background-color 1s ease;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}
body.barbecue-night {
  background-color: #1a0a00;
}
.card {
  background-color: #fff;
  border-radius: 20px;
  box-shadow: 0 8px 30px rgba(210, 105, 30, 0.15);
  padding: 40px 30px;
  max-width: 480px;
  width: 100%;
  text-align: center;
  transition: all 0.8s ease;
  position: relative;
  overflow: hidden;
}
body.barbecue-night .card {
  background-color: #2d1a0a;
  box-shadow: 0 8px 40px rgba(255, 87, 34, 0.3);
}
.emoji {
  font-size: 48px;
  animation: sizzle 2s ease-in-out infinite alternate;
  cursor: pointer;
  user-select: none;
  display: inline-block;
}
@keyframes sizzle {
  from { transform: scale(1) rotate(-3deg); }
  to { transform: scale(1.1) rotate(3deg); }
}
h1 {
  color: #d2691e;
  font-size: 1.8rem;
  margin-top: 10px;
  margin-bottom: 8px;
  transition: color 0.8s ease;
}
body.barbecue-night h1 {
  color: #ffab73;
  text-shadow: 0 0 20px rgba(255, 171, 115, 0.5);
}
.subtitle {
  color: #999;
  font-size: 0.9rem;
  margin-bottom: 24px;
  transition: color 0.8s ease;
}
body.barbecue-night .subtitle {
  color: #c4a484;
}
.to-name {
  color: #c0392b;
  font-weight: bold;
  transition: color 0.8s ease;
}
body.barbecue-night .to-name {
  color: #ff8a65;
}
/* 夜间限定早睡提醒 */
.night-reminder {
  background-color: #ede7f6;
  border-radius: 10px;
  padding: 10px 16px;
  margin-bottom: 14px;
  color: #4527a0;
  font-size: 0.9rem;
  text-align: center;
  border: 1.5px dashed #b39ddb;
  animation: popIn 0.6s ease;
  transition: all 0.8s ease;
}
body.barbecue-night .night-reminder {
  background-color: #1a0f2e;
  color: #d1c4e9;
  border-color: #7e57c2;
}

/* 每日运势签 */
.daily-fortune {
  background-color: #fff3e0;
  border-radius: 10px;
  padding: 10px 16px;
  margin-bottom: 14px;
  color: #e65100;
  font-size: 0.9rem;
  text-align: center;
  border: 1.5px dashed #ffcc80;
  position: relative;
  transition: all 0.8s ease;
}
body.barbecue-night .daily-fortune {
  background-color: #2d1a0a;
  color: #ffab73;
  border-color: #ff6b35;
}
.daily-fortune::before {
  content: '📅';
  margin-right: 6px;
}

.message {
  background-color: #fff8f0;
  border-radius: 12px;
  padding: 18px 16px;
  margin-bottom: 28px;
  color: #5d4037;
  line-height: 1.8;
  font-size: 1rem;
  border-left: 4px solid #ffab73;
  text-align: left;
  transition: all 0.8s ease;
}
body.barbecue-night .message {
  background-color: #3d2310;
  color: #ffe0b2;
  border-left-color: #ff6b35;
}
.feedback {
  display: none;
  background-color: #e8f5e9;
  border-radius: 12px;
  padding: 18px;
  margin-top: 10px;
  color: #2e7d32;
  font-weight: bold;
  animation: popIn 0.4s ease;
}
@keyframes popIn {
  0% { opacity: 0; transform: scale(0.8); }
  100% { opacity: 1; transform: scale(1); }
}
.checkbox-group {
  display: flex;
  flex-direction: column;
  gap: 14px;
  margin-bottom: 10px;
}
.option-label {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 16px;
  border-radius: 14px;
  background-color: #fff0e6;
  border: 2px solid transparent;
  cursor: pointer;
  transition: all 0.3s ease;
  font-size: 1.1rem;
  color: #5d4037;
  position: relative;
}
body.barbecue-night .option-label {
  background-color: #3d2310;
  color: #ffe0b2;
}
.option-label:hover {
  background-color: #ffe0c8;
  transform: translateY(-2px);
}
body.barbecue-night .option-label:hover {
  background-color: #4d2e15;
  box-shadow: 0 0 15px rgba(255, 107, 53, 0.2);
}
.option-label input[type="radio"], .option-label input[type="checkbox"] {
  width: 20px;
  height: 20px;
  accent-color: #d2691e;
  cursor: pointer;
}
.option-label.both-check {
  background-color: #f3e5f5;
}
body.barbecue-night .option-label.both-check {
  background-color: #2d1a3a;
}
.option-label.both-check:hover {
  background-color: #e1bee7;
}
body.barbecue-night .option-label.both-check:hover {
  background-color: #3d2250;
}
.confirm-btn {
  margin-top: 24px;
  padding: 14px 36px;
  font-size: 1.1rem;
  color: white;
  background-color: #d2691e;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  transition: all 0.3s ease;
}
body.barbecue-night .confirm-btn {
  background-color: #ff5722;
  box-shadow: 0 0 20px rgba(255, 87, 34, 0.4);
}
.confirm-btn:hover {
  background-color: #b25918;
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(210, 105, 30, 0.3);
}
body.barbecue-night .confirm-btn:hover {
  background-color: #e64a19;
  box-shadow: 0 6px 25px rgba(255, 87, 34, 0.6);
}
.confirm-btn:active {
  transform: translateY(0);
}

/* Konami Code 彩蛋粒子样式 */
.particle {
  position: fixed;
  font-size: 24px;
  pointer-events: none;
  animation: fall linear forwards;
  z-index: 9999;
}
@keyframes fall {
  0% { transform: translateY(-50px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
}

/* 自定义右键菜单样式 */
.custom-context {
  position: fixed;
  background-color: #fff;
  border-radius: 10px;
  padding: 12px 18px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  z-index: 9999;
  font-size: 0.9rem;
  color: #d2691e;
  animation: popIn 0.3s ease;
  pointer-events: none;
}
body.barbecue-night .custom-context {
  background-color: #3d2310;
  color: #ffab73;
  box-shadow: 0 4px 20px rgba(255,87,34,0.3);
}

/* 深夜烧烤模式火焰粒子 */
.fire-particle {
  position: fixed;
  font-size: 28px;
  pointer-events: none;
  animation: rise linear infinite;
  z-index: 9998;
}
@keyframes rise {
  0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
  50% { opacity: 1; }
  100% { transform: translateY(-100px) scale(1.2); opacity: 0; }
}

/* 点击火焰效果 */
.fire-ring {
  position: absolute;
  border-radius: 50%;
  border: 3px solid #ff5722;
  animation: fireRing 0.6s ease-out forwards;
  pointer-events: none;
}
@keyframes fireRing {
  0% { width: 0; height: 0; opacity: 1; }
  100% { width: 120px; height: 120px; opacity: 0; transform: translate(-50%, -50%); }
}

/* 深夜模式提示文字 */
.night-hint {
  display: none;
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background-color: rgba(45, 26, 10, 0.9);
  color: #ffab73;
  padding: 10px 20px;
  border-radius: 20px;
  font-size: 0.85rem;
  animation: slideUp 0.5s ease;
  z-index: 9997;
}
@keyframes slideUp {
  from { transform: translateX(-50%) translateY(30px); opacity: 0; }
  to { transform: translateX(-50%) translateY(0); opacity: 1; }
}
/* 移动端适配 */
@media (max-width: 480px) {
  .card {
    padding: 28px 20px;
    margin-top: 10px;
  }
  .emoji {
    font-size: 42px;
  }
  h1 {
    font-size: 1.55rem;
  }
  .subtitle {
    font-size: 0.85rem;
  }
  .message {
    font-size: 0.95rem;
    padding: 14px 14px;
  }
  .option-label {
    padding: 14px;
    font-size: 1rem;
  }
  .confirm-btn {
    padding: 12px 28px;
    font-size: 1rem;
  }
  .checkbox-group {
    gap: 10px;
  }
}

/* 加油祝福彩蛋的隐藏小火苗 */
.hidden-fire {
  position: fixed;
  bottom: 16px;
  right: 16px;
  font-size: 22px;
  opacity: 0.5;
  cursor: pointer;
  z-index: 50;
  transition: opacity 0.3s ease, transform 0.3s ease;
  user-select: none;
  filter: grayscale(0.3);
  animation: firePulse 2.5s ease-in-out infinite;
}
.hidden-fire:hover, .hidden-fire:active {
  opacity: 1;
  transform: scale(1.3);
  filter: grayscale(0);
  animation: none;
}
@keyframes firePulse {
  0%, 100% { opacity: 0.45; filter: grayscale(0.3) drop-shadow(0 0 2px rgba(255,87,34,0.3)); }
  50% { opacity: 0.7; filter: grayscale(0) drop-shadow(0 0 6px rgba(255,87,34,0.5)); }
}

/* 祝福横幅 */
.wish-banner {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background-color: #fff8e1;
  border: 2px solid #ffb300;
  border-radius: 16px;
  padding: 18px 28px;
  font-size: 1.15rem;
  color: #e65100;
  font-weight: bold;
  box-shadow: 0 8px 30px rgba(255, 179, 0, 0.25);
  z-index: 10000;
  animation: wishPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  text-align: center;
  white-space: nowrap;
}
@keyframes wishPop {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(0.6); }
  100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
}

/* 奖杯粒子 */
.trophy-particle {
  position: fixed;
  font-size: 26px;
  pointer-events: none;
  animation: floatUp linear forwards;
  z-index: 9999;
}
@keyframes floatUp {
  0% { transform: translateY(40px) scale(0.4) rotate(-15deg); opacity: 0; }
  15% { opacity: 1; }
  100% { transform: translateY(-90vh) scale(1.1) rotate(15deg); opacity: 0; }
}
</style>
</head>
<body>

<div class="card">
<div class="emoji">🥩🔥🍖</div>
<h1>烤肉局邀请函</h1>
<p class="subtitle">From: hygee / To: <span class="to-name">dscad</span></p>

<div id="nightReminder"></div>

<div class="daily-fortune" id="dailyFortune">今日运势加载中…</div>

<div class="message">
嗨～dscad！
这周末要不要一起吃烤肉呀
已经憋不住想吃香喷喷的烤肉了
本人已提前空好肚子
你快来选一天！
</div>

<div class="checkbox-group">
<label class="option-label">
  <input type="radio" name="day" value="周六">
  <span>🌞 周六 — 白天逛街晚上吃肉，美滋滋</span>
</label>
<label class="option-label">
  <input type="radio" name="day" value="周日">
  <span>😎 周日 — 前六天挨的饿这顿补回来</span>
</label>
<label class="option-label both-check">
  <input type="checkbox" id="both">
  <span>🤤 不能光选一天，我全都要（多选）</span>
</label>
</div>

<button class="confirm-btn" onclick="submitChoice()">确认选择！🍖</button>

<div class="feedback" id="feedback"></div>
</div>

<div class="hidden-fire" title="试试点我～">🔥</div>

<script>
// ============ 每日烤肉签 ============
const dailyMessages = [
  "今日运势：大吉，宜见面 ✨",
  "你比昨天更棒了，继续保持！💪",
  "今天的你，闪闪发光 🌟",
  "别焦虑，一切都会顺利的",
  "星象显示：今天适合做任何决定 🌙",
  "宜出门走走，忌闷在家里",
  "算了一卦，今天会有小惊喜 🎉",
  "别忙了，偶尔放空一下也不错",
  "今天的你，值得被温柔对待",
  "运势大吉，好事正在路上 🍀",
  "宜和喜欢的人待在一起",
  "今日心情签：随心所欲，顺其自然",
  "星星说：你会遇到很好的事 ✨",
  "能量不足？充会电就好了 🔋",
  "今日宜微笑，忌皱眉头",
  "运气正在悄悄帮你 🪄",
  "别纠结了，跟着感觉走",
  "今日幸运色：让你开心的颜色",
  "心情预报：多云转晴 ☀️",
  "宜和 dscad 约一顿香喷喷的烤肉 🥩",
  "今天不赶时间，慢慢来",
  "幸运指数：🌟🌟🌟🌟🌟",
  "宇宙发来信号：你很重要 🌌",
  "今日宜尝试新事物，忌一成不变",
  "预测：今天会有值得纪念的时刻",
  "签文：用心生活，好运自来",
  "宜笑，宜吃，宜见面 🎈",
  "运势小助手：对自己好一点",
  "今日主题词：轻松自在～",
  "星盘转动，好消息在赶来 ✨",
  "最后提醒：你已经很棒了！"
];

function showDailyFortune() {
  const now = new Date();
  const month = now.getMonth() + 1;
  const day = now.getDate();
  const dateStr = month + '月' + day + '日';
  const index = (now.getFullYear() * 365 + now.getMonth() * 31 + now.getDate()) % dailyMessages.length;
  const el = document.getElementById('dailyFortune');
  if (el) el.innerText = '📅 ' + dateStr + ' · ' + dailyMessages[index];
}
showDailyFortune();

// ============ 早晚安问候 ============
function checkTimeGreeting() {
  const hour = new Date().getHours();
  const reminder = document.getElementById('nightReminder');
  if (!reminder) return;

  if (hour >= 23 || hour < 5) {
    reminder.className = 'night-reminder';
    reminder.innerText = '🌙 已经夜深啦，早点休息吧～明天又是元气满满的一天！';
  } else if (hour >= 6 && hour < 10) {
    reminder.className = 'night-reminder';
    reminder.style.backgroundColor = '#e3f2fd';
    reminder.style.color = '#1565c0';
    reminder.style.borderColor = '#90caf9';
    reminder.innerText = '☀️ 早呀！今天也要开心哦～';
  }
}
checkTimeGreeting();

// ============ 右键彩蛋（桌面端 + 移动端长按） ============
document.addEventListener('contextmenu', function(e) {
  e.preventDefault();
  showCustomContext(e.clientX, e.clientY);
});

// 移动端长按模拟右键（按住0.6秒触发）
let touchTimer = null;
let touchStartPos = null;
document.addEventListener('touchstart', function(e) {
  if (e.target.closest('button, input, label')) return;
  touchStartPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  touchTimer = setTimeout(() => {
    showCustomContext(touchStartPos.x, touchStartPos.y);
    touchTimer = null;
  }, 600);
}, { passive: true });

function cancelTouch() {
  if (touchTimer) { clearTimeout(touchTimer); touchTimer = null; }
}
document.addEventListener('touchend', cancelTouch);
document.addEventListener('touchmove', cancelTouch);

function showCustomContext(x, y) {
  let old = document.querySelector('.custom-context');
  if (old) old.remove();

  let div = document.createElement('div');
  div.className = 'custom-context';
  div.style.left = x + 'px';
  div.style.top = y + 'px';
  div.innerText = '复制我干嘛，快去约烤肉！🍖';
  document.body.appendChild(div);

  // 防止菜单超出屏幕
  let rect = div.getBoundingClientRect();
  if (rect.right > window.innerWidth) div.style.left = (window.innerWidth - rect.width - 10) + 'px';
  if (rect.bottom > window.innerHeight) div.style.top = (window.innerHeight - rect.height - 10) + 'px';

  setTimeout(() => div.remove(), 2000);
}

// ============ Konami Code 彩蛋 ============
let konamiCode = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
let konamiIndex = 0;

document.addEventListener('keydown', function(e) {
  if (e.key === konamiCode[konamiIndex]) {
    konamiIndex++;
    if (konamiIndex === konamiCode.length) {
      triggerKonami();
      konamiIndex = 0;
    }
  } else {
    konamiIndex = 0;
  }
});

function triggerKonami() {
  const emojis = ['🥩','🔥','🍖','🍗','🍢','🌭'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      let p = document.createElement('div');
      p.className = 'particle';
      p.innerText = emojis[Math.floor(Math.random() * emojis.length)];
      p.style.left = Math.random() * 100 + 'vw';
      p.style.animationDuration = (2 + Math.random() * 3) + 's';
      p.style.fontSize = (18 + Math.random() * 24) + 'px';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 5000);
    }, i * 80);
  }

  let feedback = document.querySelector('#feedback');
  feedback.style.display = 'block';
  feedback.style.backgroundColor = '#fff8e1';
  feedback.style.color = '#e65100';
  feedback.innerText = '🔓 神秘代码已激活！烤肉雨来啦！';
  setTimeout(() => {
    if (feedback.innerText.includes('神秘代码')) feedback.style.display = 'none';
  }, 3000);
}

function triggerStarRain() {
  const emojis = ['🌙','⭐','🌟','✨','💫','🪐'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      let p = document.createElement('div');
      p.className = 'particle';
      p.innerText = emojis[Math.floor(Math.random() * emojis.length)];
      p.style.left = Math.random() * 100 + 'vw';
      p.style.animationDuration = (2.5 + Math.random() * 3.5) + 's';
      p.style.fontSize = (20 + Math.random() * 28) + 'px';
      p.style.textShadow = '0 0 8px rgba(255,255,200,0.8)';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 6000);
    }, i * 70);
  }

  let feedback = document.querySelector('#feedback');
  feedback.style.display = 'block';
  feedback.style.backgroundColor = '#ede7f6';
  feedback.style.color = '#4527a0';
  feedback.innerText = '🌌 星空已为你点亮！';
  setTimeout(() => {
    if (feedback.innerText.includes('星空')) feedback.style.display = 'none';
  }, 3000);
}

// 手机版：连续点击标题 7 次触发星空雨
let titleClickCount = 0;
let titleClickTimer = null;
document.querySelector('h1').addEventListener('click', function() {
  titleClickCount++;
  clearTimeout(titleClickTimer);
  titleClickTimer = setTimeout(() => { titleClickCount = 0; }, 1500);
  if (titleClickCount >= 7) {
    triggerStarRain();
    titleClickCount = 0;
  }
});

// ============ 疯狂点击 → 深夜烧烤模式 ============
let clickCount = 0;
let clickTimer = null;
let nightMode = false;

document.querySelector('.emoji').addEventListener('click', function(e) {
  clickCount++;

  // 火焰扩散效果
  let ring = document.createElement('div');
  ring.className = 'fire-ring';
  let rect = e.target.getBoundingClientRect();
  ring.style.left = (rect.left + rect.width/2) + 'px';
  ring.style.top = (rect.top + rect.height/2) + 'px';
  document.body.appendChild(ring);
  setTimeout(() => ring.remove(), 600);

  clearTimeout(clickTimer);
  clickTimer = setTimeout(() => { clickCount = 0; }, 1500);

  if (clickCount >= 5 && !nightMode) {
    activateNightMode();
    clickCount = 0;
  }
});

function activateNightMode() {
  nightMode = true;
  document.body.classList.add('barbecue-night');

  // 火焰粒子向上飘
  const fires = ['🔥','✨','🔆'];
  for (let i = 0; i < 20; i++) {
    setTimeout(() => {
      let f = document.createElement('div');
      f.className = 'fire-particle';
      f.innerText = fires[Math.floor(Math.random() * fires.length)];
      f.style.left = Math.random() * 100 + 'vw';
      f.style.animationDuration = (3 + Math.random() * 4) + 's';
      f.style.fontSize = (20 + Math.random() * 30) + 'px';
      document.body.appendChild(f);
    }, i * 200);
  }

  let feedback = document.querySelector('#feedback');
  feedback.style.display = 'block';
  feedback.style.backgroundColor = '#3e2723';
  feedback.style.color = '#ffcc80';
  feedback.innerText = '🌙 深夜烧烤模式已开启！火势太猛了！';

  // 显示提示
  let hint = document.createElement('div');
  hint.className = 'night-hint';
  hint.innerText = '再点一次emoji可关闭深夜模式 🔥';
  hint.style.display = 'block';
  document.body.appendChild(hint);
  setTimeout(() => hint.remove(), 4000);
}

// 点击关闭深夜模式
document.querySelector('.emoji').addEventListener('dblclick', function() {
  if (nightMode) {
    document.body.classList.remove('barbecue-night');
    document.querySelectorAll('.fire-particle').forEach(f => f.remove());
    nightMode = false;
    let feedback = document.querySelector('#feedback');
    feedback.style.display = 'block';
    feedback.style.backgroundColor = '#e8f5e9';
    feedback.style.color = '#2e7d32';
    feedback.innerText = '☀️ 已回到白天，继续选日子吧～';
    setTimeout(() => { if (feedback.innerText.includes('回到白天')) feedback.style.display = 'none'; }, 3000);
  }
});

// ============ 加油祝福彩蛋 ============
let wishTriggered = false;

document.querySelector('.hidden-fire').addEventListener('click', function(e) {
  if (wishTriggered) return;
  wishTriggered = true;

  // 奖杯和星星粒子从底部升起
  const trophies = ['🏆','✨','🥇','💪','🎉','🌟'];
  for (let i = 0; i < 30; i++) {
    setTimeout(() => {
      let p = document.createElement('div');
      p.className = 'trophy-particle';
      p.innerText = trophies[Math.floor(Math.random() * trophies.length)];
      p.style.left = Math.random() * 100 + 'vw';
      p.style.animationDuration = (2.5 + Math.random() * 3) + 's';
      p.style.fontSize = (20 + Math.random() * 28) + 'px';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 5500);
    }, i * 60);
  }

  // 弹出祝福横幅
  let banner = document.createElement('div');
  banner.className = 'wish-banner';
  banner.innerHTML = '🌙 周末比赛顺利，你是最蚌的！';
  document.body.appendChild(banner);

  setTimeout(() => banner.remove(), 3000);
  setTimeout(() => wishTriggered = false, 5000);
});

// ============ 原始选择逻辑 ============
let confirmClicks = 0;

function submitChoice() {
  const radios = document.querySelectorAll('input[name="day"]');
  const both = document.querySelector('#both');
  const feedback = document.querySelector('#feedback');
  let selected = [];
  radios.forEach(r => { if (r.checked) selected.push(r.value); });
  if (both.checked) selected.push('我全都要');

  confirmClicks++;

  if (selected.length === 0) {
    feedback.style.display = 'block';
    feedback.style.backgroundColor = '#ffebee';
    feedback.style.color = '#c62828';
    feedback.innerText = '不选一个日子就……我只能对着空气烤肉了 🥺';
  } else {
    feedback.style.display = 'block';
    feedback.style.backgroundColor = '#e8f5e9';
    feedback.style.color = '#2e7d32';
    if (selected.includes('我全都要')) {
      feedback.innerText = '好耶！成年人不做选择，全都要！🥩🥩🥩 收到你的回复啦～';
    } else if (confirmClicks > 2) {
      feedback.innerText = '别点了！已经在生火🔥了！急啥！';
    } else {
      feedback.innerText = '收到！「' + selected.join('、') + '」已预订成功！期待烤肉局 🍖🍻';
    }
  }
}
</script>
